<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 480px;
      height: 340px;
      background: #121212;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }

    /* ── Titlebar ── */
    .titlebar {
      height: 40px;
      background: linear-gradient(180deg, #1c1c1c 0%, #161616 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 0 16px;
      -webkit-app-region: drag;
    }

    .titlebar-title {
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .btn-close {
      -webkit-app-region: no-drag;
      width: 42px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      outline: none;
    }

    .btn-close::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0);
      border: 1px solid transparent;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .btn-close:hover::after {
      background: rgba(220, 38, 38, 0.75);
      border-color: rgba(255, 100, 100, 0.25);
      box-shadow: inset 0 1px 0 rgba(255, 160, 160, 0.18), 0 2px 6px rgba(180, 0, 0, 0.3);
    }

    .btn-close:active::after { background: rgba(185, 28, 28, 0.85); }
    .btn-close svg { position: relative; z-index: 1; }

    /* ── Content ── */
    .content {
      padding: 20px 20px;
    }

    .section-title {
      color: rgba(255, 255, 255, 0.3);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      margin-bottom: 8px;
      transition: background 0.15s;
    }

    .setting-row:hover { background: rgba(255, 255, 255, 0.055); }

    .setting-info { flex: 1; padding-right: 16px; }

    .setting-label {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .setting-desc {
      color: rgba(255, 255, 255, 0.38);
      font-size: 11px;
      line-height: 1.45;
    }

    /* ── Toggle switch ── */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .slider {
      position: absolute;
      cursor: default;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      transition: background 0.2s, border-color 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: rgba(168, 85, 247, 0.65);
      border-color: rgba(168, 85, 247, 0.45);
    }

    input:checked + .slider::before {
      transform: translateX(16px);
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Settings</span>
    <button class="btn-close" id="btn-close" title="Schließen">
      <svg width="10" height="10" viewBox="0 0 10 10">
        <line x1="0.5" y1="0.5" x2="9.5" y2="9.5" stroke="rgba(255,255,255,0.75)" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="9.5" y1="0.5" x2="0.5" y2="9.5" stroke="rgba(255,255,255,0.75)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="content">
    <div class="section-title">Gameplay</div>

    <div class="setting-row">
      <div class="setting-info">
        <div class="setting-label">Compact HUD</div>
        <div class="setting-desc">Zeigt Score, FPS und Accuracy weiter oben, näher am Spielfeld</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-compact-hud">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('toggle-compact-hud');

    window.appSettings.getSettings().then(settings => {
      toggle.checked = !!settings.compactHud;
    });

    toggle.addEventListener('change', () => {
      window.appSettings.saveSettings({ compactHud: toggle.checked });
    });

    document.getElementById('btn-close').addEventListener('click', () => {
      window.appSettings.close();
    });

    // Double-click titlebar to do nothing (prevent accidental interactions)
    document.querySelector('.titlebar').addEventListener('dblclick', (e) => e.stopPropagation());
  </script>
</body>
</html>
