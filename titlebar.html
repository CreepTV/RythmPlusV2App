<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 40px;
      overflow: hidden;
    }

    body {
      background: linear-gradient(180deg, #1c1c1c 0%, #121212 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      user-select: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo-area {
      display: flex;
      align-items: center;
      height: 100%;
      padding-left: 14px;
    }

    .logo {
      height: 25px;
      object-fit: contain;
      pointer-events: auto;
      opacity: 0.9;
      cursor: default;
      -webkit-app-region: no-drag;
      border-radius: 4px;
      transition: opacity 0.15s;
    }

    .logo:hover { opacity: 0.65; }

    .center-title {
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      pointer-events: none;
      max-width: 50%;
    }

    .center-title span {
      color: rgba(255, 255, 255, 0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.3px;
    }

    .controls {
      display: flex;
      align-items: center;
      height: 100%;
      -webkit-app-region: no-drag;
      padding-right: 6px;
      gap: 3px;
    }

    .btn {
      width: 42px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      border: none;
      background: transparent;
      border-radius: 6px;
      position: relative;
      outline: none;
      transition: none;
    }

    /* Glassy hover layer */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0);
      border: 1px solid transparent;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover::after {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.13),
        inset 0 -1px 0 rgba(0, 0, 0, 0.2),
        0 2px 6px rgba(0, 0, 0, 0.25);
    }

    .btn:active::after {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .btn.close:hover::after {
      background: rgba(220, 38, 38, 0.75);
      border-color: rgba(255, 100, 100, 0.25);
      box-shadow:
        inset 0 1px 0 rgba(255, 160, 160, 0.18),
        0 2px 6px rgba(180, 0, 0, 0.3);
    }

    .btn.close:active::after {
      background: rgba(185, 28, 28, 0.85);
    }

    .btn.update {
      width: 28px;
      height: 28px;
      margin-left: 2px;
      padding: 0;
      -webkit-app-region: no-drag;
      position: relative;
    }

    .update-dot {
      position: absolute;
      top: 3px;
      right: 5px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e84393;
      z-index: 2;
      box-shadow: 0 0 5px rgba(232, 67, 147, 0.7);
      animation: update-pulse 2s ease-in-out infinite;
    }

    @keyframes update-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(0.75); }
    }

    .btn.profile {
      width: 28px;
      height: 28px;
      margin-left: 6px;
      padding: 0;
      -webkit-app-region: no-drag;
    }

    .profile-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      position: relative;
      z-index: 1;
      pointer-events: none;
    }

    .btn svg {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="logo-area">
    <img class="logo" src="./data/rythmplus-logo.png" alt="Rhythm+">

  </div>

  <div class="center-title" id="song-title" style="display:none">
    <span id="song-title-text"></span>
  </div>

  <div class="controls">
        <button class="btn update" id="btn-update" title="Update verfügbar — klicken zum Installieren" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
        <path d="M12 2v14M6 10l6 6 6-6" stroke="rgba(232,67,147,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 20h16" stroke="rgba(168,85,247,0.9)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="update-dot"></span>
    </button>
        <button class="btn profile" id="btn-profile" title="Profillink kopieren" style="display:none">
      <img id="profile-avatar" class="profile-avatar" style="display:none" alt="">
      <svg id="icon-user" width="12" height="12" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg id="icon-user-check" width="12" height="12" viewBox="0 0 24 24" fill="none" style="display:none">
        <polyline points="20 6 9 17 4 12" stroke="rgba(100,255,150,0.95)" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <!-- Minimize -->
    <button class="btn" id="btn-minimize" title="Minimize">
      <svg width="10" height="1" viewBox="0 0 10 1">
        <rect width="10" height="1" fill="rgba(255,255,255,0.7)"/>
      </svg>
    </button>

    <!-- Maximize / Restore -->
    <button class="btn" id="btn-maximize" title="Maximize">
      <svg id="icon-maximize" width="10" height="10" viewBox="0 0 10 10">
        <rect x="0.75" y="0.75" width="8.5" height="8.5" fill="none"
              stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
      </svg>
      <svg id="icon-restore" width="10" height="10" viewBox="0 0 10 10" style="display:none">
        <rect x="2.5" y="0.5" width="7" height="7" fill="none"
              stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
        <rect x="0.5" y="2.5" width="7" height="7" fill="#121212"
              stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
      </svg>
    </button>

    <!-- Close -->
    <button class="btn close" id="btn-close" title="Close">
      <svg width="10" height="10" viewBox="0 0 10 10">
        <line x1="0.5" y1="0.5" x2="9.5" y2="9.5"
              stroke="rgba(255,255,255,0.75)" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="9.5" y1="0.5" x2="0.5" y2="9.5"
              stroke="rgba(255,255,255,0.75)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script>
    document.getElementById('btn-minimize').addEventListener('click', () => window.windowControls.minimize());
    document.getElementById('btn-maximize').addEventListener('click', () => window.windowControls.maximize());
    document.getElementById('btn-close').addEventListener('click', () => window.windowControls.close());

    document.querySelector('.logo').addEventListener('click', () => window.windowControls.navigateHome());

    document.getElementById('btn-update').addEventListener('click', () => window.windowControls.openUpdateWindow());

    window.windowControls.onUpdateAvailable(() => {
      document.getElementById('btn-update').style.display = 'flex';
    });

    document.getElementById('btn-profile').addEventListener('click', () => {
      window.windowControls.copyProfileLink();
      const avatar = document.getElementById('profile-avatar');
      const iconUser = document.getElementById('icon-user');
      const iconCheck = document.getElementById('icon-user-check');
      const hadAvatar = avatar.style.display !== 'none';
      avatar.style.display = 'none';
      iconUser.style.display = 'none';
      iconCheck.style.display = 'block';
      setTimeout(() => {
        iconCheck.style.display = 'none';
        if (hadAvatar) {
          avatar.style.display = 'block';
        } else {
          iconUser.style.display = 'block';
        }
      }, 1500);
    });

    window.windowControls.onProfileUpdate((data) => {
      const btn = document.getElementById('btn-profile');
      const avatar = document.getElementById('profile-avatar');
      const iconUser = document.getElementById('icon-user');
      if (data && data.username) {
        btn.title = `Profillink kopieren (@${data.username})`;
        btn.style.display = 'flex';
        if (data.photoURL) {
          avatar.src = data.photoURL;
          avatar.style.display = 'block';
          iconUser.style.display = 'none';
        } else {
          avatar.style.display = 'none';
          iconUser.style.display = 'block';
        }
      } else {
        btn.style.display = 'none';
      }
    });

    window.windowControls.onDisplayTitle((title) => {
      const el = document.getElementById('song-title');
      const text = document.getElementById('song-title-text');
      if (title) {
        text.textContent = title;
        el.style.display = 'flex';
      } else {
        el.style.display = 'none';
        text.textContent = '';
      }
    });

    // Double-click on drag area to maximize/restore
    document.body.addEventListener('dblclick', (e) => {
      if (e.target.closest('.controls')) return;
      window.windowControls.maximize();
    });

    window.windowControls.onMaximizeChange((isMaximized) => {
      document.getElementById('icon-maximize').style.display = isMaximized ? 'none' : 'block';
      document.getElementById('icon-restore').style.display = isMaximized ? 'block' : 'none';
    });
  </script>
</body>
</html>
